# Site settings
title: "AI Tools Guide"
email: "ansefm15@gmail.com"
description: "Review dan panduan AI tools terbaik untuk productivity dan bisnis"
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://anansetiawan40-oss.github.io" # the base hostname & protocol for your site
twitter_username: ""
github_username: "anansetiawan40-oss"

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# SEO settings
google_analytics: "" # Add your GA tracking ID later

# Social links
social_links:
  twitter: ""
  github:  "anansetiawan40-oss"

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Anan Setiawan"
      categories: "AI Tools"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Navigation
header_pages:
  - about.md

# Comments (optional)
# disqus:
#   shortname: your-disqus-shortname

# Pagination
paginate: 5
paginate_path: "/page:num/"
# Site settings
title: "AI Tools Guide"
email: "ansefm15@gmail.com"
description: "Review dan panduan AI tools terbaik untuk productivity dan bisnis"
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://anansetiawan40-oss.github.io" # the base hostname & protocol for your site
twitter_username: ""
github_username: "anansetiawan40-oss"

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

# Minimal Mistakes theme settings
minimal_mistakes_skin: "default" # "default", "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum"
search: true
comments:
  provider: "" # false, "disqus", "discourse", "facebook", "staticman", "staticman_v2", "utterances", "giscus", "custom"
  disqus:
    shortname: "" # your disqus shortname

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# SEO settings
google_analytics: "" # Add your GA tracking ID later

# Social links
social_links:
  twitter: ""
  github:  "anansetiawan40-oss"

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      author: "Anan Setiawan"
      categories: "AI Tools"
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      comments: false

# Navigation
navigation:
  - title: "Home"
    url: /
  - title: "About"
    url: /about/
  - title: "Categories"
    url: /categories/
  - title: "Tags"
    url: /tags/
  - title: "Archive"
    url: /year-archive/

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/anansetiawan40-oss"
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:ansefm15@gmail.com"

# Comments (optional)
# disqus:
#   shortname: your-disqus-shortname

# Pagination
paginate: 5
paginate_path: "/page:num/"